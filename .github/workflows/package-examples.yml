name: Create UltimateBasic

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "assets/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"
      - "examples/**"
      - "README.pdf"
      - ".github/workflows/package-examples.yml"

jobs:
  zip-examples:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            label: Windows x64
            runner: windows-latest
            binary_name: ub.exe
          - id: windows-arm64
            label: Windows ARM64
            runner: windows-11-arm
            binary_name: ub.exe
          - id: macos-x64
            label: macOS Intel
            runner: macos-15-intel
            binary_name: ub
          - id: macos-arm64
            label: macOS Apple Silicon
            runner: macos-latest
            binary_name: ub

    name: ${{ matrix.label }} package
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build ub release binary
        shell: pwsh
        run: cargo build --release --bin ub

      - name: Prepare package contents
        shell: pwsh
        run: |
          $stagingDir = Join-Path $env:RUNNER_TEMP "ultimate-basic-examples"
          $archiveName = "ultimate-basic-examples-${{ matrix.id }}.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $binaryPath = Join-Path "target/release" "${{ matrix.binary_name }}"

          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          New-Item -ItemType Directory -Path $stagingDir | Out-Null
          Copy-Item -Path "examples" -Destination $stagingDir -Recurse
          Copy-Item -Path "README.pdf" -Destination $stagingDir
          Copy-Item -Path $binaryPath -Destination $stagingDir
          Compress-Archive -Path (Join-Path $stagingDir "*") -DestinationPath $archivePath

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultimate-basic-examples-${{ matrix.id }}
          path: ${{ runner.temp }}/ultimate-basic-examples-${{ matrix.id }}.zip
          if-no-files-found: error